<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Member Login — Phoenix Ghanaian SDA Church</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-page {
      min-height: 100vh;
      background: linear-gradient(150deg, #091f47 0%, #1a4b9c 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      position: relative; overflow: hidden;
    }
    .auth-page::before {
      content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(58,123,213,0.18) 0%, transparent 70%);
      top: -150px; right: -150px; pointer-events: none;
    }
    .auth-page::after {
      content: ''; position: absolute;
      inset: 0; pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 64px 64px;
    }
    .auth-card {
      background: var(--white); border-radius: var(--radius-lg);
      padding: 2.75rem; width: 100%; max-width: 440px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.25);
      position: relative; z-index: 2;
    }
    .auth-logo {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 2rem; text-decoration: none;
    }
    .auth-logo img { width: 42px; height: 42px; object-fit: contain; }
    .auth-logo-text { font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; color: var(--navy); line-height: 1.25; }
    .auth-title { font-family: var(--font-display); font-size: 1.75rem; color: var(--navy); margin-bottom: 0.4rem; }
    .auth-sub { font-size: 0.9rem; color: var(--text-light); margin-bottom: 2rem; }
    .auth-tabs { display: flex; border-radius: 8px; overflow: hidden; border: 2px solid var(--border); margin-bottom: 1.75rem; }
    .auth-tab {
      flex: 1; padding: 0.6rem; text-align: center; font-size: 0.88rem;
      font-weight: 600; cursor: pointer; background: var(--off-white);
      color: var(--text-light); border: none; font-family: var(--font-body);
      transition: all 0.2s ease;
    }
    .auth-tab.active { background: var(--navy); color: var(--white); }
    .auth-form { display: flex; flex-direction: column; gap: 0.7rem; }
    .auth-form input {
      width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--border);
      border-radius: 8px; font-family: var(--font-body); font-size: 0.92rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s; color: var(--text);
    }
    .auth-form input:focus { border-color: var(--blue-light); box-shadow: 0 0 0 3px rgba(58,123,213,0.1); }
    .auth-name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
    .auth-btn {
      width: 100%; padding: 0.82rem; background: var(--blue); color: var(--white);
      border: none; border-radius: 8px; font-family: var(--font-body); font-weight: 700;
      font-size: 0.95rem; cursor: pointer; transition: all 0.2s ease; margin-top: 0.4rem;
    }
    .auth-btn:hover { background: var(--navy); transform: translateY(-1px); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .auth-divider { text-align: center; color: var(--text-light); font-size: 0.82rem; margin: 0.5rem 0; }
    .auth-back { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-light); }
    .auth-back a { color: var(--blue-light); font-weight: 600; }
    .auth-message {
      padding: 0.82rem 1rem; border-radius: 8px; font-size: 0.88rem;
      margin-top: 0.5rem; display: none;
    }
    .auth-message.success { background: #e8f5ee; border: 1px solid #b2dfc4; color: #1a6b42; }
    .auth-message.error   { background: #fdecea; border: 1px solid #f5c6cb; color: #9b1c1c; }

    /* Member dashboard (shown after login) */
    .dashboard { display: none; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.75rem; }
    .dashboard-title { font-family: var(--font-display); font-size: 1.4rem; color: var(--navy); }
    .dashboard-welcome { font-size: 0.88rem; color: var(--text-light); margin-top: 0.2rem; }
    .signout-btn {
      background: none; border: 2px solid var(--border); color: var(--text-light);
      padding: 0.42rem 0.9rem; border-radius: 6px; font-size: 0.82rem;
      font-family: var(--font-body); cursor: pointer; transition: all 0.2s ease;
    }
    .signout-btn:hover { border-color: var(--navy); color: var(--navy); }
    .dashboard-stat {
      background: var(--off-white); border-radius: var(--radius); padding: 1.25rem;
      border: 1px solid var(--border); margin-bottom: 0.85rem;
    }
    .dashboard-stat h4 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-light); margin-bottom: 0.4rem; }
    .dashboard-stat p { font-family: var(--font-display); font-size: 1.3rem; color: var(--navy); font-weight: 700; }
    .dashboard-links { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
    .dashboard-links a {
      padding: 0.7rem 1rem; background: var(--blue-pale); color: var(--blue);
      border-radius: 8px; font-size: 0.88rem; font-weight: 600; text-align: center;
      transition: all 0.2s ease;
    }
    .dashboard-links a:hover { background: var(--blue); color: var(--white); }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <a href="index.html" class="auth-logo">
        <img src="logo.png" alt="SDA Logo">
        <span class="auth-logo-text">Phoenix Ghanaian<br>SDA Church</span>
      </a>

      <!-- AUTH FORMS (shown when logged out) -->
      <div id="authForms">
        <h2 class="auth-title">Member Portal</h2>
        <p class="auth-sub">Sign in or create a member account.</p>

        <div class="auth-tabs">
          <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">Create Account</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm">
          <div class="auth-form">
            <input type="email" id="loginEmail" placeholder="Email Address"/>
            <input type="password" id="loginPassword" placeholder="Password"/>
            <button class="auth-btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
          </div>
          <p class="auth-divider">—</p>
          <p style="text-align:center;font-size:0.85rem;color:var(--text-light)">
            <a href="#" onclick="showResetForm()" style="color:var(--blue-light);font-weight:600">Forgot your password?</a>
          </p>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" style="display:none">
          <div class="auth-form">
            <div class="auth-name-row">
              <input type="text" id="signupFirst" placeholder="First Name"/>
              <input type="text" id="signupLast" placeholder="Last Name"/>
            </div>
            <input type="email" id="signupEmail" placeholder="Email Address"/>
            <input type="password" id="signupPassword" placeholder="Password (min 6 chars)"/>
            <button class="auth-btn" id="signupBtn" onclick="handleSignup()">Create Account</button>
          </div>
        </div>

        <!-- RESET FORM -->
        <div id="resetForm" style="display:none">
          <p style="font-size:0.9rem;color:var(--text-light);margin-bottom:1rem">Enter your email and we'll send you a reset link.</p>
          <div class="auth-form">
            <input type="email" id="resetEmail" placeholder="Email Address"/>
            <button class="auth-btn" onclick="handleReset()">Send Reset Link</button>
          </div>
          <p class="auth-divider">—</p>
          <p style="text-align:center;font-size:0.85rem">
            <a href="#" onclick="switchTab('login')" style="color:var(--blue-light);font-weight:600">Back to Sign In</a>
          </p>
        </div>

        <div id="authMessage" class="auth-message"></div>
      </div>

      <!-- DASHBOARD (shown when logged in) -->
      <div id="dashboard" class="dashboard">
        <div class="dashboard-header">
          <div>
            <p class="dashboard-title">Welcome Back 👋</p>
            <p class="dashboard-welcome" id="dashboardEmail"></p>
          </div>
          <button class="signout-btn" onclick="handleSignout()">Sign Out</button>
        </div>
        <div class="dashboard-stat">
          <h4>Member Since</h4>
          <p id="memberSince">—</p>
        </div>
        <div class="dashboard-links">
          <a href="give.html">💛 Give Online</a>
          <a href="events.html">📅 View Events</a>
          <a href="contact.html">✉️ Contact the Church</a>
          <a href="index.html">🏠 Back to Website</a>
        </div>
      </div>

      <p class="auth-back"><a href="index.html">← Back to Website</a></p>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</body>
</html>
